<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Relume 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Handlee&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;
            font-family: "Roboto", sans-serif;
            font-style: normal;
        }
        header{
            width: 100%;
            height: 72px;
            display: flex;
            padding: 0 64px;
            justify-content: space-between;
            align-items: center;
        }
        header > img{
            width: 80px;
            height: 40px;
        }
        .header-nav{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }
        nav{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }
        nav > button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        button > p {
            font-size: 16px;
            font-weight: 400; 
        }
        a{
            font-size: 16px;
            font-weight: 400;
            color: black;
        }
        .btn-wraper{
            display: flex;
            gap: 16px;
            
        }
        .btn-wraper > button{
            padding: 8px 20px;
            background-color: black;
            border: 1px solid black;
            color: white;
        }

    </style>
</head>

<body>
   <header>
    <img src="/marketing-components/navbars/assets/images/company-logo.svg" alt="">
    <div class="header-nav">
        <nav>
             <a href="">Link One</a>
            <a href="">Link Two </a>
            <a href="">Link Tree</a>
            <button>
                <p>Link Four</p>
                <img src="/marketing-components/navbars/assets/images/chevron-down.svg" alt="image chevron down">
            </button>
        </nav>

    </div>
        <div class="btn-wraper">
            <button>Button</button>
    
        </div>
   </header>
</body>

</html>
